services:
  backend:
    build:
      context: ./home-cloud-backend
    container_name: backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./home-cloud-frontend
      dockerfile: Dockerfile
    volumes:
      - ./home-cloud-frontend:/home-cloud-frontend
      - /home-cloud-frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
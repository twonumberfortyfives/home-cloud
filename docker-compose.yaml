services:
  backend:
    build:
      context: ./home-cloud-backend
      target: development
    volumes:
      - ./home-cloud-backend/src:/app/src
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./home-cloud-frontend
      target: development
    volumes:
      - ./home-cloud-frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true